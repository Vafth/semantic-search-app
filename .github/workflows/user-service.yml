name: User Service CI

on:
  push:
    paths:
      - 'services/user_service/**'
      - 'services/common/**'
      - '.github/workflows/user-service.yml'
  pull_request:
    paths:
      - 'services/user_service/**'
      - 'services/common/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: project_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --package user_service --package semantic_search_app --group dev

      - name: Run tests
        env:
          POSTGRES_URL: postgresql+asyncpg://admin:password123@localhost:5432/project_db_test
          SECRET_KEY: test-secret-not-for-production-x
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 5
        run: uv run pytest services/user_service/tests